workflow_id: chat_direct_agent_default
name: Chat Direct Agent Default
description: >
  Default direct chat workflow for channel ingress that routes the user message
  to the selected agent profile without explicit orchestration-delegation steps.

permissions:
  policy_strategy: profile_only
  tool_policy:
    default: deny
    rules:
      - effect: allow
        tool: read
      - effect: allow
        tool: write
      - effect: allow
        tool: edit
      - effect: allow
        tool: bash
      - effect: allow
        tool: get_todo_list
      - effect: allow
        tool: manage_todo_list
      - effect: allow
        tool: query_memory
      - effect: allow
        tool: web_search
      - effect: allow
        tool: web_fetch
      - effect: allow
        tool: ask_user_questions
      - effect: allow
        tool: get_capabilities
      - effect: allow
        tool: get_agent_profiles
      - effect: allow
        tool: spawn_subagent_async
      - effect: allow
        tool: wait_for_subagents
      - effect: allow
        tool: check_subagent_status
      - effect: allow
        tool: create_tool_candidate
      - effect: allow
        tool: validate_tool_candidate
      - effect: allow
        tool: publish_tool_candidate
      - effect: allow
        tool: upsert_tool
      - effect: allow
        tool: create_skill
      - effect: allow
        tool: update_skill
      - effect: allow
        tool: list_skill_files
      - effect: allow
        tool: upsert_skill_file
      - effect: allow
        tool: delete_skill_file
      - effect: allow
        tool: replace_profile_skills
      - effect: allow
        tool: add_profile_skills
      - effect: allow
        tool: remove_profile_skills
      - effect: allow
        tool: save_script_as_skill
      - effect: allow
        tool: create_artifact
      - effect: allow
        tool: list_artifacts
      - effect: allow
        tool: list_artifact_files
      - effect: allow
        tool: upsert_artifact_file
      - effect: allow
        tool: delete_artifact_file
      - effect: allow
        tool: save_script_as_artifact
      - effect: allow
        tool: browser_open_page
      - effect: allow
        tool: browser_navigate
      - effect: allow
        tool: browser_click
      - effect: allow
        tool: browser_type
      - effect: allow
        tool: browser_wait_for
      - effect: allow
        tool: browser_read_page
      - effect: allow
        tool: browser_screenshot
      - effect: allow
        tool: browser_close_page
      - effect: allow
        tool: browser_list_failure_artifacts
      - effect: allow
        tool: browser_get_failure_artifact
      - effect: allow
        tool: kanban.publish_specs
      - effect: allow
        tool: validate_specs
      - effect: allow
        tool: ls

jobs:
  - id: respond
    type: execution
    tier: heavy
    inputs:
      agent_profile: "{{ trigger.agent_profile }}"
    steps:
      - id: direct_response
        prompt_mode: append
        prompt: |
          --- CHAT REQUEST ---
          Project: {{trigger.scopeId}}

          User message:
          {{#if trigger.objective}}{{trigger.objective}}{{else}}{{#if trigger.message}}{{trigger.message}}{{else}}No user message was provided. Ask a clarifying question before continuing.{{/if}}{{/if}}

          {{#if trigger.memory_context}}
          # NOTE: memory_context injection is gated by the
          # MEMORY_CONTEXT_INJECTION_ENABLED env var (default true).
          # When disabled, the chat ingress forces trigger.memory_context=null
          # so this block is skipped.
          Retrieved memory context:
          {{json trigger.memory_context}}
          {{/if}}

          {{#if trigger.task_prompt}}
          Additional task instructions:
          {{trigger.task_prompt}}
          {{/if}}

          If the user asks to persist reusable capabilities across sessions:
          - For reusable instructions or scripts, prefer save_script_as_skill for one-shot creation and optional profile assignment.
          - You can also create or update a skill and use upsert_skill_file to write SKILL.md and support files.
          - For reusable runtime tools, use upsert_tool.
          - For reusable generic files that are not skills, use create_artifact/list_artifacts and upsert_artifact_file or save_script_as_artifact.
          - Prefer add_profile_skills and remove_profile_skills for non-destructive profile changes.
          - Use replace_profile_skills only when the user explicitly asks to replace the full skill set.

          Provide a direct assistant response for the user.
          If required information is missing, call ask_user_questions.
