server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        set $api_backend api;
        rewrite ^/api/(.*) /api/$1 break;
        proxy_pass http://$api_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /kanban-api {
        return 301 /kanban-api/;
    }

    location /kanban-api/ {
        set $kanban_backend kanban;
        rewrite ^/kanban-api/(.*) /api/$1 break;
        proxy_pass http://$kanban_backend:3012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /chat-api {
        return 301 /chat-api/;
    }

    location /chat-api/ {
        set $chat_backend api;
        rewrite ^/chat-api/(.*) /api/$1 break;
        proxy_pass http://$chat_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        set $telemetry_backend api;
        proxy_pass http://$telemetry_backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
